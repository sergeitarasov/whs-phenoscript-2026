<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="900" height="220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7"
            refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0077be"/>
    </marker>
  </defs>

  <style>
    .node {
      fill: #f8f9fa;
      stroke: #333;
      stroke-width: 2;
      rx: 10;
      ry: 10;
    }
    .label {
      font-family: Arial, sans-serif;
      font-size: 16px;
      fill: #111;
    }
    .edge {
      stroke: #0077be;
      stroke-width: 3;
      fill: none;
      marker-end: url(#arrowhead);
    }
    .edge-label {
      font-family: Arial, sans-serif;
      font-size: 14px;
      fill: #0077be;
    }
  </style>

  <!-- Nodes -->
  <rect class="node" x="40" y="80" width="120" height="50"/>
  <text class="label" x="100" y="110" text-anchor="middle">this</text>

  <rect class="node" x="340" y="80" width="170" height="50"/>
  <text class="label" x="425" y="110" text-anchor="middle">aism-protibia</text>

  <rect class="node" x="700" y="80" width="150" height="50"/>
  <text class="label" x="775" y="110" text-anchor="middle">pato-present</text>

  <!-- Edges -->
  <line class="edge" x1="160" y1="105" x2="340" y2="105"/>
  <text class="edge-label" x="250" y="90" text-anchor="middle">bfo-has_part</text>

  <line class="edge" x1="510" y1="105" x2="700" y2="105"/>
  <text class="edge-label" x="605" y="90" text-anchor="middle">ro-has_characteristic</text>
</svg>
