snippet-dir: ''
# ADD the names of the authors and ORCID (https://orcid.org)
authors:
  'Sergei Tarasov': https://orcid.org/0000-0001-5237-2330
# ADD a short title of your project
project-title: "My first Coleoptera in PhenoScript"
importOntologies:
